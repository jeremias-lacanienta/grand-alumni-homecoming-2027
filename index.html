<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARHS Homecoming · January 31, 2027</title>
  <meta name="description" content="Manuel A. Roxas High School Alumni Homecoming · January 31, 2027" />

  <!-- Open Graph (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MARHS Alumni Association, Inc." />
  <meta property="og:title" content="2027 MARHS Grand Alumni Homecoming" />
  <meta property="og:description" content="January 31, 2027 · 9:00 AM · Manuel A. Roxas High School, Paco, Manila. Come home." />
  <meta property="og:url" content="https://grand-alumni-homecoming-2027.pages.dev/" />
  <meta property="og:image" content="https://grand-alumni-homecoming-2027.pages.dev/assets/og-image.jpg" />
  <meta property="og:image:secure_url" content="https://grand-alumni-homecoming-2027.pages.dev/assets/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="675" />
  <meta property="og:image:alt" content="Come home — 2027 MARHS Grand Alumni Homecoming" />

  <!-- Twitter card (also used by some link previewers) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="2027 MARHS Grand Alumni Homecoming" />
  <meta name="twitter:description" content="January 31, 2027 · 9:00 AM · Manuel A. Roxas High School, Paco, Manila." />
  <meta name="twitter:image" content="https://grand-alumni-homecoming-2027.pages.dev/assets/og-image.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HERO (poster image with FlipDown overlay) -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <img src="assets/logo-alumni.png" alt="MARHS Alumni Association, Inc." class="hero-logo" />
      <div class="hero-eyebrow">MARHS Alumni Association, Inc.</div>
      <h1 class="hero-title">
        <span class="line">2027</span>
        <span class="line line-name">Grand Alumni Homecoming</span>
      </h1>
      <div class="hero-date">January 31, 2027 · 9:00 AM</div>
    </div>
    <div class="flipdown-slot">
      <div id="flipdown" class="flipdown" aria-live="polite"></div>
    </div>
  </section>

  <!-- TRANSITION -->
  <section class="bridge">
    <p class="bridge-text">
      <span>Forty-six batches.</span>
      <span>Ten celebrants.</span>
      <span>One homecoming.</span>
    </p>
  </section>

  <!-- BATCHES -->
  <div class="batches" id="batches"></div>

  <!-- ALL ALUMNI -->
  <section class="alumni-all">
    <div class="alumni-eyebrow">All Alumni</div>
    <h3 class="alumni-title"><em>Every batch</em>, come home.</h3>
    <div class="alumni-sub">Batches 1967 — 2012</div>
    <div class="year-strip" id="yearStrip" aria-hidden="true"></div>
    <div class="alumni-foot">★ celebrant batches in gold</div>
  </section>

  <!-- CRESCENDO (poster image) -->
  <picture class="finale">
    <source media="(min-width: 1100px)" srcset="assets/finale-desktop.png" />
    <img src="assets/finale-mobile.png" alt="Come home. January 31, 2027 · 9:00 AM · Manuel A. Roxas High School, Paco, Manila" />
  </picture>

  <script src="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
